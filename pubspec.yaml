name: mamana_plus
description: MamanaPlus v2 mobile app (Phase 1 — iOS + Android). Single Flutter module; sections under lib/core, lib/features, lib/shared.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  go_router: ^14.6.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  provider: ^6.1.2
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5
  image_picker: ^1.1.2
  pro_image_editor: ^12.0.0
  record: ^6.2.0
  video_player: ^2.9.2
  just_audio: ^0.9.40
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
